<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>日日是好日</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 页面容器 -->
  <div class="app-container">

    <!-- ==================== 记录页 ==================== -->
    <div class="page page-record active" id="page-record">
      <div class="page-header">
        <h1 class="page-title">我的状态</h1>
        <span class="page-date" id="record-date"></span>
      </div>

      <div class="dimensions-list" id="dimensions-list">
        <!-- 维度卡片由 JS 动态生成 -->
      </div>

      <div class="add-dimension-btn" id="add-dimension-btn">
        <span class="add-icon">+</span>
        <span class="add-text" id="add-dimension-text">添加维度（5/10）</span>
      </div>

      <div class="confirm-btn" id="confirm-btn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
    </div>

    <!-- ==================== 月历页 ==================== -->
    <div class="page page-calendar" id="page-calendar">
      <div class="page-header">
        <h1 class="page-title">月历</h1>
        <span class="page-subtitle">每日主导状态一览</span>
      </div>

      <div class="calendar-nav">
        <button class="cal-nav-btn" id="cal-prev">&lt;</button>
        <div class="cal-title-area">
          <span class="cal-month-title" id="cal-month-title"></span>
          <span class="cal-lunar-year" id="cal-lunar-year"></span>
        </div>
        <button class="cal-nav-btn" id="cal-next">&gt;</button>
      </div>

      <div class="calendar-grid" id="calendar-grid">
        <!-- 日历由 JS 动态生成 -->
      </div>

      <div class="month-summary-card" id="month-summary-card">
        <div class="summary-label">状态描述</div>
        <div class="summary-text" id="month-summary-text"></div>
      </div>
    </div>

    <!-- ==================== 统计页 ==================== -->
    <div class="page page-stats" id="page-stats">
      <div class="stats-nav">
        <button class="cal-nav-btn" id="stats-prev">&lt;</button>
        <span class="stats-month-title" id="stats-month-title"></span>
        <button class="cal-nav-btn" id="stats-next">&gt;</button>
      </div>

      <div class="stats-record-days" id="stats-record-days">
        <div class="stats-label">本月记录天数</div>
        <div class="stats-number" id="stats-days-number">0</div>
      </div>

      <div class="stats-dimensions" id="stats-dimensions">
        <!-- 维度进度条由 JS 动态生成 -->
      </div>

      <div class="chart-card">
        <div class="chart-title">维度占比分布</div>
        <div class="chart-container">
          <canvas id="donut-chart" width="240" height="240"></canvas>
          <div class="chart-center-text">
            <span class="chart-center-number" id="chart-center-number">0</span>
            <span class="chart-center-unit">天</span>
          </div>
        </div>
        <div class="chart-legend" id="chart-legend">
          <!-- 图例由 JS 动态生成 -->
        </div>
      </div>
    </div>

    <!-- ==================== 底部导航 ==================== -->
    <nav class="bottom-nav">
      <div class="nav-item active" data-page="record">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <span class="nav-label">记录</span>
      </div>
      <div class="nav-item" data-page="calendar">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="nav-label">月历</span>
      </div>
      <div class="nav-item" data-page="stats">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span class="nav-label">统计</span>
      </div>
    </nav>

    <!-- ==================== 日期详情弹窗 ==================== -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-content" id="modal-content">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-date-title"></h2>
          <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-summary" id="modal-summary"></div>
        <div class="modal-dimensions" id="modal-dimensions">
          <!-- 维度详情由 JS 动态生成 -->
        </div>
      </div>
    </div>

    <!-- ==================== 添加维度弹窗 ==================== -->
    <div class="modal-overlay" id="add-modal-overlay">
      <div class="modal-content add-modal-content">
        <div class="modal-header">
          <h2 class="modal-title">添加维度</h2>
          <button class="modal-close" id="add-modal-close">&times;</button>
        </div>
        <div class="add-dimension-options" id="add-dimension-options">
          <!-- 可选维度由 JS 动态生成 -->
        </div>
      </div>
    </div>
  </div>

  <script src="js/ganzhi.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
