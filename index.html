<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>日日是好日</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.jpg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 页面容器 -->
  <div class="app-container">

    <!-- ==================== 记录页 ==================== -->
    <div class="page page-record active" id="page-record">
      <div class="page-header">
        <h1 class="page-title">我的状态</h1>
        <span class="page-date" id="record-date"></span>
        <div class="header-actions">
          <button class="header-confirm-btn" id="confirm-btn" title="确认记录">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </button>
          <button class="theme-switcher-btn" id="theme-switcher-btn" title="切换主题">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.38 3.46L16 2 12 5.5 8 2 3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/>
            </svg>
          </button>
        </div>
        <div class="record-date-indicator" id="record-date-indicator" style="display:none;"></div>
      </div>

      <div class="dimensions-list" id="dimensions-list">
        <!-- 维度卡片由 JS 动态生成 -->
      </div>

      <!-- 内联添加维度编辑行 -->
      <div class="inline-edit-row" id="inline-edit-row" style="display:none;">
        <button class="inline-icon-picker-btn" id="inline-icon-picker-btn">
          <span id="inline-icon-preview">🎯</span>
        </button>
        <input type="text" class="inline-name-input" id="inline-name-input" placeholder="输入新增维度" maxlength="6">
        <button class="inline-confirm-btn" id="inline-confirm-btn">确认</button>
        <button class="inline-cancel-btn" id="inline-cancel-btn">取消</button>
      </div>

      <div class="add-dimension-btn" id="add-dimension-btn">
        <span class="add-icon">+</span>
        <span class="add-text" id="add-dimension-text">添加维度状态</span>
      </div>
    </div>

    <!-- ==================== 月历页 ==================== -->
    <div class="page page-calendar" id="page-calendar">
      <div class="page-header">
        <h1 class="page-title">月历</h1>
        <span class="page-subtitle">每日主导状态一览</span>
      </div>

      <div class="calendar-nav">
        <button class="cal-nav-btn" id="cal-prev">&lt;</button>
        <div class="cal-title-area">
          <span class="cal-month-title" id="cal-month-title"></span>
          <span class="cal-lunar-year" id="cal-lunar-year"></span>
        </div>
        <button class="cal-nav-btn" id="cal-next">&gt;</button>
      </div>

      <div class="calendar-grid" id="calendar-grid">
        <!-- 日历由 JS 动态生成 -->
      </div>

      <div class="month-summary-card" id="month-summary-card">
        <div class="summary-label">状态描述</div>
        <div class="summary-text" id="month-summary-text"></div>
      </div>
    </div>

    <!-- ==================== 统计页 ==================== -->
    <div class="page page-stats" id="page-stats">
      <div class="stats-nav">
        <button class="cal-nav-btn" id="stats-prev">&lt;</button>
        <span class="stats-month-title" id="stats-month-title"></span>
        <button class="cal-nav-btn" id="stats-next">&gt;</button>
      </div>

      <div class="stats-record-days" id="stats-record-days">
        <div class="stats-label">本月记录天数</div>
        <div class="stats-number" id="stats-days-number">0</div>
      </div>

      <div class="stats-dimensions" id="stats-dimensions">
        <!-- 维度进度条由 JS 动态生成 -->
      </div>

      <div class="chart-card">
        <div class="chart-title">状态占比分布</div>
        <div class="chart-wrapper">
          <div class="chart-container">
            <canvas id="donut-chart" width="220" height="220"></canvas>
            <div class="chart-center-text">
              <span class="chart-center-number" id="chart-center-number">0</span>
              <span class="chart-center-unit">天</span>
            </div>
          </div>
          <div class="chart-labels" id="chart-labels">
            <!-- 标签由 JS 动态生成 -->
          </div>
        </div>
        <div class="chart-legend" id="chart-legend">
          <!-- 图例由 JS 动态生成 -->
        </div>
      </div>

      <div class="data-management-card">
        <div class="data-management-title">数据管理</div>
        <div class="data-management-desc">导出数据可永久备份，换设备时导入恢复。</div>
        <div class="data-management-buttons">
          <button class="data-btn" id="stats-export-btn">导出备份</button>
          <button class="data-btn" id="stats-import-btn">导入恢复</button>
        </div>
      </div>
    </div>

    <!-- ==================== 底部导航 ==================== -->
    <nav class="bottom-nav">
      <div class="nav-item active" data-page="record">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <span class="nav-label">记录</span>
      </div>
      <div class="nav-item" data-page="calendar">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="nav-label">月历</span>
      </div>
      <div class="nav-item" data-page="stats">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span class="nav-label">统计</span>
      </div>
    </nav>

    <!-- ==================== 日期详情弹窗（底部弹出） ==================== -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-content" id="modal-content">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-date-title"></h2>
          <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-summary" id="modal-summary"></div>
        <div class="modal-dimensions" id="modal-dimensions">
          <!-- 维度详情由 JS 动态生成 -->
        </div>
        <div class="no-data-modal-buttons" style="margin-top: 20px;">
          <button class="no-data-btn-primary" id="modal-edit-record">修改记录</button>
          <button class="no-data-btn-secondary" id="modal-close-btn">关闭</button>
        </div>
      </div>
    </div>

    <!-- ==================== 无数据日期弹窗（居中） ==================== -->
    <div class="modal-overlay centered-modal-overlay" id="no-data-modal-overlay">
      <div class="modal-content centered-modal-content">
        <h2 class="modal-title" id="no-data-modal-title"></h2>
        <p class="no-data-modal-text">该日期尚未记录状态。</p>
        <div class="no-data-modal-buttons">
          <button class="no-data-btn-primary" id="no-data-go-record">去记录</button>
          <button class="no-data-btn-secondary" id="no-data-close">关闭</button>
        </div>
      </div>
    </div>

    <!-- ==================== 图标选择器弹窗 ==================== -->
    <div class="icon-picker-overlay" id="icon-picker-overlay">
      <div class="icon-picker-popup">
        <div class="icon-picker-title">选择图标</div>
        <div class="icon-picker-grid" id="icon-picker-grid">
          <!-- 图标由 JS 动态生成 -->
        </div>
      </div>
    </div>

    <!-- ==================== 备注弹窗 ==================== -->
    <div class="modal-overlay" id="note-modal-overlay">
      <div class="modal-content" style="border-radius: 20px; padding: 28px 24px; max-width: 360px;">
        <h2 class="modal-title" id="note-modal-title" style="margin-bottom: 16px;">备注</h2>
        <textarea class="note-textarea" id="note-textarea" placeholder="输入备注内容（不超过150字）" maxlength="150"></textarea>
        <div style="text-align: right; margin-top: 8px;">
          <span class="note-char-count" id="note-char-count">0/150</span>
        </div>
        <div class="no-data-modal-buttons" style="margin-top: 20px;">
          <button class="no-data-btn-primary" id="note-save-btn">保存</button>
          <button class="no-data-btn-secondary" id="note-cancel-btn">取消</button>
        </div>
      </div>
    </div>

    <!-- 隐藏的文件输入框（用于导入数据） -->
    <input type="file" id="data-import-input" accept=".json" style="display:none;">
  </div>

  <script src="js/ganzhi.js?v=20"></script>
  <script src="js/app.js?v=20"></script>
</body>
</html>
